services:
  nginxpre:
    container_name: nginxpre
    build:
      context: ./docker/alpine
      dockerfile: Dockerfile
      no_cache: true
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    command: >
      sh -c "
      echo $KEYCLOAK_ADMIN &&
      echo $KEYCLOAK_ADMIN_PASSWORD &&
      htpasswd -b /etc/nginx/.htpasswd $KEYCLOAK_ADMIN $KEYCLOAK_ADMIN_PASSWORD > /etc/nginx/.htpasswd
      "
    volumes:
      - /data/docker-nginx/:/etc/nginx/
    networks:
      - chimitheque

  nginx:
    container_name: nginx
    image: nginx:1.31
    restart: unless-stopped
    ports:
      - 443:443
      - 80:80
    environment:
      - CHIMITHEQUE_CNAME=${CHIMITHEQUE_CNAME}
      - TZ='Europe/Paris'
    volumes:
      - /data/docker-nginx/.htpasswd:/etc/nginx/.htpasswd
      - /data/docker-nginx/nginx-auth/certs:/etc/nginx/certs
      - /data/docker-nginx/nginx-templates:/etc/nginx/templates
      - /data/docker-nginx/nginx-conf/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - chimitheque
    depends_on:
      - nginxpre
      - keycloak
      - chimitheque

  postgres:
    container_name: postgres
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: keycloak
      TZ: "Europe/Paris"
    networks:
      - chimitheque
    volumes:
      - /data/docker-postgres:/var/lib/postgresql

  keycloakpre:
    container_name: keycloakpre
    image: ubuntu:jammy
    environment:
      - CHIMITHEQUE_APPURL=${CHIMITHEQUE_APPURL}
      - CHIMITHEQUE_OIDCCLIENTSECRET=${CHIMITHEQUE_OIDCCLIENTSECRET}
      - TZ='Europe/Paris'
    command: >
      bash -c "
      echo $CHIMITHEQUE_APPURL &&
      echo $CHIMITHEQUE_OIDCCLIENTSECRET &&
      sed 's CHIMITHEQUE_APPURL $CHIMITHEQUE_APPURL g; s CHIMITHEQUE_OIDCCLIENTSECRET $CHIMITHEQUE_OIDCCLIENTSECRET g' /templates/chimitheque-realm-template.json > /import/chimitheque-realm.json
      "
    volumes:
      - /data/docker-keycloak/import:/import
      - /data/docker-keycloak/templates:/templates
    networks:
      - chimitheque

  keycloak:
    container_name: keycloak
    restart: unless-stopped
    depends_on:
      - postgres
      - keycloakpre
    # for devel only
    ports:
      - 8080:8080
    build:
      context: ./docker/keycloak
      dockerfile: Dockerfile
      no_cache: true
      args:
        KC_DB: postgres
        KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
        KC_DB_USERNAME: postgres
        KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
        KC_FEATURES: docker:v1,admin:v2,hostname:v2
        KC_HTTP_RELATIVE_PATH: /keycloak
        KC_TZ: "Europe/Paris"
    entrypoint: "/opt/keycloak/bin/kc.sh start --optimized --import-realm"
    # developper command
    # keycloak export REALM command
    #entrypoint: "/opt/keycloak/bin/kc.sh export --dir /opt/keycloak/data/import --realm chimitheque --users different_files --users-per-file 1000 --optimized"
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KEYCLOAK_ADMIN}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME=${CHIMITHEQUE_APPURL}/keycloak
      - KC_HTTP_PORT=8080
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_ENABLED=true
      - KC_HTTP_HOST=keycloak
    volumes:
      - /data/docker-keycloak/import:/opt/keycloak/data/import
    networks:
      - chimitheque

  chimitheque:
    container_name: chimitheque
    image: ${CHIMITHEQUE_IMAGE}
    restart: unless-stopped
    depends_on:
      - jaeger
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=parentbased_traceidratio
      - OTEL_TRACES_SAMPLER_ARG=1.0
      - CHIMITHEQUE_APPURL=${CHIMITHEQUE_APPURL}
      - CHIMITHEQUE_ADMINS=${CHIMITHEQUE_ADMINS}
      - TZ='Europe/Paris'
    volumes:
      - /data/docker-chimitheque/chimitheque-db:/data
    networks:
      - chimitheque

  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    command:
      - "--query.base-path=/jaeger"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    # for devel only
    ports:
      - "6831:6831/udp" # UDP port for Jaeger agent
      - "16686:16686" # Web UI
      - "14268:14268" # HTTP port for spans
      - "4317:4317" # gRPC port for spans
    networks:
      - chimitheque

networks:
  chimitheque:
